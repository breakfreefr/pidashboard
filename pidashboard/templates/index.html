<!DOCTYPE html>
<html>
<head>
    <title>Live Departures</title>
    <meta http-equiv="refresh" content="20"> <!-- auto-refresh -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"
</head>
<body>

<h1>LIVE DEPARTURES @ {{ now.strftime("%H:%M:%S") }}</h1>

{% for stop in stops %}
<div class="stop">
    <h2>{{ stop.name }}</h2>

    {% for dep in stop.departures %}
    <div class="row {% if 'NOW' in dep.time %}flash{% endif %}">
        <div class="time flip-container">
            <div class="flip-inner">{{ dep.time }}</div>
        </div>
        <div class="line">{{ dep.line }}</div>
        <div class="destination">{{ dep.destination }}</div>
        <div class="delay {{ 'late' if '+' in dep.delay else 'ontime' }}">{{ dep.delay }}</div>
    </div>
{% endfor %}    
</div>
{% endfor %}

<script>
function flipTimes() {
    const times = document.querySelectorAll('.flip-inner');
    times.forEach(el => {
        el.classList.remove('flip');
        void el.offsetWidth; // force reflow
        el.classList.add('flip');
    });
}

// Trigger flip every refresh
setInterval(flipTimes, 2000); // adjust as needed
</script>

<div class="footer">Last update: {{ now.strftime("%H:%M:%S") }}</div>

</body>
</html>
