<!DOCTYPE html>
<html>
<head>
    <title>Departures</title>
    <meta http-equiv="refresh" content="30"> <!-- auto refresh -->
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
        }
        h2 {
            border-bottom: 1px solid #444;
        }
        .departure {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }
        .delay {
            color: orange;
        }
    </style>
</head>
<body>

<h1>Live Departures</h1>

{% for stop in stops %}
    <h2>{{ stop.name }}</h2>

    {% for dep in stop.departures %}
        <div class="departure">
            <span>{{ dep.time }}</span>
            <span>{{ dep.line }}</span>
            <span>{{ dep.destination }}</span>
            <span class="delay">{{ dep.delay }}</span>
        </div>
    {% endfor %}

{% endfor %}

</body>
</html>
